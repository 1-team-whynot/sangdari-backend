spring:
  application:
    name: sangdari
  datasource:
    url: jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?characterEncoding=UTF-8&serverTimezone=UTC
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  config:
    import: optional:file:.env[.properties]

mybatis:
  mapper-locations: classpath:mapper/**/*Mapper.xml
  type-aliases-package: com.sangdari
  configuration:
    map-underscore-to-camel-case: true

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS}
  max-age: 3600

storage:
  files:
    # 마지막 '/'가 빠지면 파일접근 안정
    location: storage/files/

toss:
  payments:
    base-url: https://api.tosspayments.com
    secret-key: ${TOSS_SECRET_KEY}

security:
  jwt:
    secure: false
    issuer: sangdari@sangdari.com
    type: JWT
    access-token-expiry: 1000000
    refresh-token-expiry: 1296000000
    refresh-token-cookie-name: refresh-token
    refresh-token-cookie-expiry: 1296000
    secret: ${JWT_SECRET}
    header-key: Authorization
    scheme: Bearer
    reissue-uri: /api/reissue-token

logging:
  file:
    name: logs/error.log
  level:
    com.example.project.mapper: error